<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gen AI Concepts Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f172a,#020617);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:800px;
background:#111827;
padding:30px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:25px;
color:#38bdf8;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.option{
background:#1f2937;
padding:12px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#334155;
}

.option.selected{
background:#2563eb;
}

button{
margin-top:20px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.result{
text-align:center;
font-size:22px;
}

</style>
</head>

<body>

<div class="container">

<h1>Gen AI Concepts Quiz for Abhitha</h1>

<div id="quiz"></div>

<button id="nextBtn">Next</button>

</div>

<script>

const quizData = [

{
q:"1. A company builds an AI assistant that answers user questions automatically. Which technology powers it?",
options:["LLM","Docker","Neo4j","CNN","SQL"],
answer:0
},

{
q:"2. A recruiter wants AI to automatically categorize emails as 'Important' or 'Spam'. What is this task called?",
options:["Classification","Clustering","Regression","Translation","Rendering"],
answer:0
},

{
q:"3. Asking an AI question without giving any example is called:",
options:["One-shot prompting","Few-shot prompting","Zero-shot prompting","Chain prompting","Training"],
answer:2
},

{
q:"4. Providing two or more examples before asking the model is:",
options:["Zero-shot","Few-shot","One-shot","Random prompting","Embedding"],
answer:1
},

{
q:"5. If an AI explains step-by-step reasoning before answering, it is using:",
options:["Few-shot prompting","Chain-of-thought prompting","Embedding","Tokenization","Sampling"],
answer:1
},

{
q:"6. When AI converts the word 'Hello' into numbers for training, this process is:",
options:["Encoding","Compression","Scaling","Normalization","Clustering"],
answer:0
},

{
q:"7. A recommendation engine finds similar sentences using:",
options:["Embeddings","Decision trees","Random forests","CNN","Logistic regression"],
answer:0
},

{
q:"8. AI detecting objects in images typically uses:",
options:["CNN","RNN","LSTM","Naive Bayes","K-Means"],
answer:0
},

{
q:"9. Which neural network is commonly used for processing sequences of text?",
options:["RNN","CNN","Decision Tree","Random Forest","Gradient Boosting"],
answer:0
},

{
q:"10. GPT models are based on which architecture?",
options:["Transformer","CNN","RNN","GAN","Autoencoder"],
answer:0
},

{
q:"11. Transformers mainly rely on which mechanism?",
options:["Attention","Pooling","Normalization","Clustering","Filtering"],
answer:0
},

{
q:"12. A social network storing users and connections should use:",
options:["Graph database","Relational database","File storage","Cache","Spreadsheet"],
answer:0
},

{
q:"13. Which database from your notes is used for graph relationships?",
options:["Neo4j","MySQL","MongoDB","Redis","Oracle"],
answer:0
},

{
q:"14. In Neo4j, a user account is represented as:",
options:["Node","Table","Container","Token","Instance"],
answer:0
},

{
q:"15. In Neo4j, a relationship like 'follows' is called:",
options:["Relation","Property","Column","Key","Cluster"],
answer:0
},

{
q:"16. A developer wants an app to run the same on laptop and server. Which tool helps?",
options:["Docker","Neo4j","Flask","TensorFlow","NumPy"],
answer:0
},

{
q:"17. Managing hundreds of containers across many servers requires:",
options:["Kubernetes","Git","MySQL","Jenkins","Redis"],
answer:0
},

{
q:"18. Kubernetes mainly manages:",
options:["Containers across machines","Databases","Training models","Prompting","Vector search"],
answer:0
},

{
q:"19. A system where AI reasons and performs actions is using:",
options:["ReAct prompting","Zero-shot prompting","Embedding","Regression","Fine tuning"],
answer:0
},

{
q:"20. Generative AI is mainly used for:",
options:["Generating text","Managing servers","Running containers","Creating databases","Building hardware"],
answer:0
}

];

let current=0;
let score=0;
let selected=null;

const quiz=document.getElementById("quiz");
const nextBtn=document.getElementById("nextBtn");

function loadQuestion(){

selected=null;

let q=quizData[current];

let html=`<div class="question">${q.q}</div>`;

q.options.forEach((opt,i)=>{

html+=`<div class="option" onclick="selectOption(this,${i})">${opt}</div>`;

});

quiz.innerHTML=html;

}

function selectOption(el,index){

document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));

el.classList.add("selected");

selected=index;

}

nextBtn.onclick=function(){

if(selected===null){
alert("Select an option");
return;
}

if(selected===quizData[current].answer){
score++;
}

current++;

if(current<quizData.length){
loadQuestion();
}
else{
showResult();
}

}

function showResult(){

quiz.innerHTML=`
<div class="result">
<h2>Your Score</h2>
<p>${score} / ${quizData.length}</p>
</div>
`;

nextBtn.style.display="none";

}

loadQuestion();

</script>

</body>
</html>
